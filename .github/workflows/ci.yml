name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Dummy values for build-time env (do not hit real services in CI)
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
      CLERK_SECRET_KEY: "sk_test_ci"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_ci"
      NEXT_PUBLIC_SITE_URL: "https://klikandgo.app"
      NEXT_PUBLIC_APP_URL: "https://klikandgo.app"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npx next build
