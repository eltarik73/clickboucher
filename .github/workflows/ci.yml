name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      # Valid-format Clerk fake keys (Clerk validates the prefix + base64 shape at build).
      CLERK_SECRET_KEY: "sk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk"
      NEXT_PUBLIC_SITE_URL: "https://klikandgo.app"
      NEXT_PUBLIC_APP_URL: "https://klikandgo.app"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply Prisma schema to CI database
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npx next build
