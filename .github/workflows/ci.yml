name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs of the same workflow on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Fake DATABASE_URL — Prisma needs a value to generate; never connects in CI
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
  DIRECT_DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
  # Valid-format Clerk fake keys (Clerk validates prefix + base64 shape at build)
  CLERK_SECRET_KEY: "sk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk"
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk"
  NEXT_PUBLIC_SITE_URL: "https://klikandgo.app"
  NEXT_PUBLIC_APP_URL: "https://klikandgo.app"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Prisma generate
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Prisma generate
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

  test:
    name: Tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-20-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply Prisma schema to CI database
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Vitest run
        run: npm run test:run
